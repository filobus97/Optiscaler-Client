name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # win-x64 is the primary target (the app patches Windows game installs).
          # Building on a Windows runner keeps the csproj's OS-conditional
          # OutputType (WinExe vs Exe) correct for the shipped binary.
          - os: windows-latest
            rid: win-x64
          # linux-x64 guards the cross-platform (Avalonia) code paths.
          - os: ubuntu-latest
            rid: linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          # Pinned to the major version targeted by OptiscalerClient.csproj (net10.0)
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore -r ${{ matrix.rid }}

      - name: Build
        run: dotnet build OptiscalerClient.csproj -c Release -r ${{ matrix.rid }} --no-restore

      # Unit tests guard the risky pure logic (PE inspection, ini editing,
      # version gate, SDK-package scan). The test project is self-contained and
      # references the app, so it needs the same RID.
      - name: Test
        run: dotnet test tests/OptiscalerClient.Tests -c Release -r ${{ matrix.rid }}
