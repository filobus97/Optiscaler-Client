name: Release

on:
  push:
    tags:
      - "v*"
  # Manual fallback: release without pushing a tag (the release step below
  # creates the tag). Useful when tags can't be pushed from the local clone.
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the leading v (e.g. 1.0.6)"
        required: true
        type: string

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: write

jobs:
  publish:
    name: Publish (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each RID is published on its native OS:
          #  - the csproj switches OutputType (WinExe/Exe) on the *build* OS, so
          #    win-x64 must be built on Windows to get a windowed executable;
          #  - PublishReadyToRun (enabled in the csproj) does not support
          #    cross-OS compilation, so building natively avoids R2R failures.
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64
          # macos-latest runners are arm64; osx-x64 is a same-OS cross-arch
          # publish, which R2R does not support -> disable R2R for this leg only.
          - os: macos-latest
            rid: osx-x64
            extra-args: -p:PublishReadyToRun=false

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          # Pinned to the major version targeted by OptiscalerClient.csproj (net10.0)
          dotnet-version: 10.0.x

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      # Untrimmed self-contained single-file publish. PublishTrimmed stays off
      # (see csproj): Avalonia + reflection-based code paths are not verified
      # trim-safe in this project, so reliability wins over size.
      - name: Publish
        run: >
          dotnet publish OptiscalerClient.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -o publish
          ${{ matrix.extra-args }}

      - name: Create zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath "OptiscalerClient-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip"

      # zip (not Compress-Archive) on Unix so the executable bit survives
      - name: Create zip (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd publish
          zip -r "../OptiscalerClient-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OptiscalerClient-${{ matrix.rid }}
          path: OptiscalerClient-*.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # On workflow_dispatch the tag does not exist yet; tag_name +
      # target_commitish make action-gh-release create it at the built commit.
      - name: Create release and attach zips
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: artifacts/*.zip
          generate_release_notes: true
          draft: false
